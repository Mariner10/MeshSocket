name: Publish to PyPI

# Builds and publishes the `meshsocket` package to PyPI when a version tag
# (vX.Y.Z) is pushed. Uses PyPI Trusted Publishing (OIDC) — no API token is
# stored anywhere; GitHub mints a short-lived credential at publish time.
#
# One-time setup (no token): add this repo + workflow as a trusted publisher for
# the `meshsocket` project at https://pypi.org/manage/account/publishing/
#   PyPI project name: meshsocket
#   Owner:             Mariner10
#   Repository:        MeshSocket
#   Workflow name:     publish.yml
#   Environment:       (leave blank)
# It can be added as a "pending" publisher before the first release exists.
#
# To release:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        working-directory: Python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: Python/dist
